username: admin
password: NokiaSrl1!
insecure: false
skip-verify: true
timeout: 10s

targets:
  srlswitch:
    address: srlswitch:57400
    subscriptions:
      - srl-system-performance
      - srl-bridge-table
      - srlswitch-if-stats
    outputs:
      - prom-output
      - file_output
    
subscriptions:
  srl-system-performance:
    mode: stream
    stream-mode: sample
    sample-interval: 5s
    paths:
      - /platform/control[slot=*]/cpu[index=all]/total
  srl-bridge-table:
    mode: stream
    stream-mode: sample
    sample-interval: 5s
    paths:
      - /network-instance[name=lanswitch]/bridge-table/statistics/total-entries
  srlswitch-if-stats:
    mode: stream
    stream-mode: sample
    sample-interval: 5s
    paths:
      - /interface[name=*]/statistics/in-multicast-packets
      - /interface[name=*]/statistics/out-multicast-packets
      - /interface[name=*]/statistics/in-unicast-packets
      - /interface[name=*]/statistics/in-error-packets
  
outputs:

  prom-output:
    type: prometheus
    listen: :9273         
  file_output:
    type: file
    filename: /data/stats_ifaces.json
    format: json
    split-events: true   
